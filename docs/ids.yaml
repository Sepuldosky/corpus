  # ── COA — Coagulant ─────────────────────────────────────────────────────────
  # El módulo mejor instrumentado del ecosistema: selftest + harness + seis rondas
  # de planilla con IDs (A/E/G/H/I). Es el ÚNICO con evidencia tipo planilla real.

  # COA-1 NO EXISTE A PROPÓSITO. La regla de realms de las defs es COR-12: su sede es
  # el contrato de ítems del framework, y lo que Coagulant, Craving y corpus-stalker
  # tienen en sus docs son COPIAS de esa norma, no normas propias. Acuñarle un ID a
  # cada copia habría fabricado el bicéfalo que §7.2 existe para evitar. Las copias
  # deben pasar a CITAR COR-12 — ver deuda D-1.

  COA-2:
    titulo: "Presencia de un ítem contra Cargo = Inventory.HasItem, NUNCA CountItem: este último solo cuenta stacks y es ciego a los unique como el torniquete."
    sede: "corpus-coagulant/CLAUDE.md §Contratos que no debes romper · 5"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: planilla, ref: "Coagulant G4 — ronda 3 ✗ → ronda 4 ✓" }
      - { tipo: selftest, ref: "con Cargo montado exige isfunction(cargo.Inventory.HasItem)" }
      - { tipo: harness, ref: "dev/harness_coagulant.py — el fake de Cargo MIENTE en CountItem para los unique: solo HasItem salva al torniquete" }
    nota: "La norma mejor respaldada del ecosistema: cadena completa planilla + selftest + harness. Su assert cross-repo es la única aserción ejecutable entre módulos del workspace."
  COA-3:
    titulo: "El consumo del ítem ocurre AL COMPLETAR el tratamiento, no al iniciar: onUse devuelve false y el TakeItem va al terminar."
    sede: "corpus-coagulant/docs/Coagulant_Architecture.md §7"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: planilla, ref: "Coagulant G2 y G5 — ronda 3 ✓" }
      - { tipo: harness, ref: "dev/harness_coagulant.py — onUse→false, inventario intacto al iniciar, TakeItem al completar, y re-validación item_gone si la unidad se fue" }
    nota: "El flujo del CLAUDE.md llegó a CONTRADECIR este contrato ('usarla loguea el stub y consume una unidad'); lo cazó el PARCHE 7 de la pasada de veracidad."
  COA-4:
    titulo: "Coagulant nunca re-escala daño ni pisa SetWalkSpeed: la cojera compone escalando el MaxSpeed del move data vía hook Move + NW2."
    sede: "corpus-coagulant/CLAUDE.md §Contratos que no debes romper · 8"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: planilla, ref: "Coagulant H2 — la cojera compone con el peso de Cargo sin rubber-band" }
      - { tipo: harness, ref: "dev/harness_coagulant.py — compone sobre el MaxSpeed que ya dejó Cargo, con los contadores de SetWalkSpeed/SetRunSpeed en cero" }
    nota: "Dos módulos escribiendo walk/run se pisan; dos escalando el MaxSpeed se multiplican. El CHANGELOG del slice 3 todavía la cita como 'contrato #6' (hoy es el #8) — puntero podrido benigno, el CHANGELOG no se reescribe por disciplina (FLU-14)."
  COA-5:
    titulo: "El hook Move es shared porque Move se predice: si el cliente escalara distinto, el jugador haría rubber-band."
