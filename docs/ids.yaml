  FLU-26:
    titulo: "Un comentario de Lua puede CITAR un ID; jamás definirlo — una decisión que solo vive en un comentario es una decisión perdida."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.2"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
  FLU-27:
    titulo: "Una norma que ENUMERA (realms, escritores, hooks, campos) se deriva por grep del código, no copiando de otro doc."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.2"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
  FLU-28:
    titulo: "BARRIDO DE RATIFICACIÓN: un parche no termina hasta que ningún otro doc ni comentario sigue enunciando lo viejo; se barre por el VALOR, no por la lista del hallazgo."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.3"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
  FLU-29:
    titulo: "El registro docs/ids.yaml es ÚNICO para las siete raíces y es índice, jamás segunda definición: no entra a la jerarquía §7.1."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.4"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "docs/ids.yaml — este archivo" }
  FLU-30:
    titulo: "Norma nueva ⇒ su entrada en el registro EN EL MISMO PARCHE; prefijo nuevo ⇒ primero en `familias`, y reusar un prefijo está prohibido."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.4"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus/.claude/check-ids/corpus_check_ids.ps1 — HUERFANO_DOC/CODIGO y FAMILIA_NO_REGISTRADA" }
      - { tipo: codigo, ref: "corpus/.claude/check-ids/test/run_tests.ps1 — fixtures huerfano y familia-no-registrada" }
    nota: "Dejó de ser disciplina y pasó a ser mecanismo el 2026-07-16: el checker corre en pre-commit y no deja commitear una norma citada sin entrada."
  FLU-31:
    titulo: "La evidencia de una norma es presencial y de tipo selftest | harness | planilla | codigo | INTENCION; el conteo de INTENCION es la métrica de salud."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.4"
    fuerza: REGLA
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus/.claude/check-ids/corpus_check_ids.ps1 — EVIDENCIA_ROTA y el conteo de INTENCION en cada corrida" }
  FLU-32:
    titulo: "CONDUCTA DETENTE: ante ambigüedad, contradicción con el árbol real o un hecho sin árbitro, la primera línea del reporte abre con el literal y se consulta al autor."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.5"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
    nota: "En Kontrol la marca tiene un hook que la ancla (SDD-6). Acá no hay hook: la norma es de conducta y hoy nada la observa."

  FLU-33:
    titulo: "ALCANCE NEGATIVO EXPLÍCITO: toda tanda declara en su PROMPT qué NO toca, en la columna NO de §5."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §8.0"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia: INTENCION
    nota: "El arma directa contra el scope creep silencioso y contra los pecados de arquitectura (subir dominio a Corpus, bajar dominio ajeno a un módulo). La columna NO es la que trabaja."
  FLU-34:
    titulo: "TEXTO LITERAL, no descripción de alto nivel: el paso entrega el texto que va, o un diff suficiente para que el ejecutor no improvise."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §8.0"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia: INTENCION
    nota: "Si el ejecutor tiene que inventar el texto, el diseño no estaba cerrado. 'Actualizar el resolver para que contemple el escudo' no es un paso: es un deseo."
  FLU-35:
    titulo: "Una tanda = un SLICE VERTICAL, y cada paso = una entrada de CHANGELOG."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §8.0"
    fuerza: REGLA
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "los CHANGELOG de Coagulant y Craving: slices 1-4, una entrada por paso" }
    nota: "Divergencia con Kontrol, cuya unidad es 'una task = un PR'. Acá no hay PRs: se commitea a main y el ledger es el CHANGELOG (FLU-14)."
  FLU-36:
    titulo: "Si la tanda ACUÑA una norma, su entrada en ids.yaml es parte del paso, no un trámite posterior."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §8.1"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus/.claude/check-ids/corpus_check_ids.ps1 — rechaza un ID citado sin registrar" }
    nota: "Es FLU-30 instanciada en el PROMPT. Ya no es disciplina: el checker corre en pre-commit."
  FLU-37:
    titulo: "El §6 CIERRE del PROMPT declara QUÉ CHECKS DE PLANILLA nacen de la tanda, con su letra de sección nueva."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §8.1"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia: INTENCION
    nota: >
      Es la norma que ataca la deuda D-2 en su origen: sin este inciso, la tanda se verifica
      en juego y no deja rastro citable, y la evidencia tipo planilla (§7.4) no se puede usar
      desde el registro. Tres de los cuatro módulos verificados ya pagaron eso. La letra no
      se recicla (FLU-07).
  FLU-38:
    titulo: "El PROMPT no es autoridad ni entra a la jerarquía §7.1: es andamiaje. Una v2 reemplaza a la v1 en el mismo archivo, conservando el nombre."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §8.3"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
    nota: "Conservar el nombre es por los punteros ya citados en otro lado. Su vigencia se traslada al CHANGELOG y al estado al cerrar; el archivo queda como scratch."

  # ── AUD — cadencia del gate de coherencia (§7.8) ────────────────────────────

  AUD-1:
    titulo: "El gate SCOPED corre al cerrar cualquier sesión que escribió normas en docs/; las sesiones de solo-código no lo disparan."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.8"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
    nota: "La contradicción de prosa nace en las sesiones de prosa. Un commit de puro Lua no puede crearla — es el mismo criterio con que el checker gatea el pre-commit."
  AUD-2:
    titulo: "El gate COMPLETO corre al cerrar un Block de módulo, antes de abrir el siguiente."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.8"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
    nota: "El bloqueo por D-7 rigió hasta el 2026-07-19: la pasada de etiquetado la recortó y el COMPLETO corrió ÍNTEGRO ese mismo día (acta 2026-07-19_coherencia_docs.md). El punto ciego residual es D-3, acotado y declarado (§7.6)."
  AUD-3:
    titulo: "Ningún gate de coherencia corre con poco contexto remanente: se difiere explícito a una sesión fresca."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.8"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
    nota: "Una ✅ emitida en condiciones degradadas es una hipótesis, no un cierre. Diferir cuesta una línea; el modo de falla que previene es el falso-limpio no re-verificado."
  AUD-4:
    titulo: "El gate es READ-ONLY estricto: propone los parches dentro de su acta y JAMÁS los aplica. Las actas son inmutables."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.8"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus/.claude/workflows/auditoria-coherencia-docs.js — la constante READ_ONLY va literal en cada agente" }
    nota: "El acta es la foto del estado AL MOMENTO DE AUDITAR, no la de hoy — esa es el estado. No se edita: si algo cambió, lo dice el acta siguiente."
  AUD-5:
    titulo: "Todo hallazgo del gate se clasifica en exactamente un bucket: A reparable | B voto del autor | C bug de código | CADUCO."
    sede: "corpus/docs/corpus_flujo_trabajo.txt §7.8"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
    nota: "El bucket B es grande acá: con cinco módulos en diseño, buena parte del cuerpo normativo habla de algo que no existe y no tiene árbitro (FLU-24). Ubicar por CONTENIDO, nunca por número de línea."

  # ── GIT — convenciones de commit ───────────────────────────────────────────
  # La familia se define en corpus/docs/corpus_convenciones_commits.txt: sus
  # secciones 0/1/2/4/5 son del ECOSISTEMA (las heredan las seis raíces
  # consumidoras, corpus-stalker incluido) y la §3 (alcances) es POR REPO —
  # por eso GIT-6 habla de tablas por repo y las demás no.

  GIT-1:
    titulo: "Todo commit sigue `<tipo>(<alcance>): <descripción>`, con el tipo en inglés y la descripción en español."
    sede: "corpus/docs/corpus_convenciones_commits.txt §1"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "git log de las siete raíces" }
  GIT-2:
    titulo: "La descripción NUNCA empieza con mayúscula, NUNCA lleva punto final, y va en presente imperativo."
    sede: "corpus/docs/corpus_convenciones_commits.txt §1"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "git log de las siete raíces" }
  GIT-3:
    titulo: "Los tipos válidos son feat/fix/refactor/docs/chore/test; se prohíben términos genéricos como 'cambios' o 'tarea'."
    sede: "corpus/docs/corpus_convenciones_commits.txt §2"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
  GIT-4:
    titulo: "Los comentarios de código y los mensajes de commit van en español; si el archivo existente mezcla estilos, se iguala el del archivo que se edita."
    sede: "corpus/CLAUDE.md §Idioma"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
  GIT-5:
    titulo: "PROHIBIDO el trailer Co-Authored-By de Claude/Anthropic, y toda atribución de co-autoría, en los mensajes de commit."
    sede: "corpus/CLAUDE.md §Git / commits"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "git log --all — ningún commit lo lleva" }
  GIT-6:
    titulo: "Las secciones 0/1/2/4/5 de las convenciones son del ecosistema; la §3 (alcances) es POR REPO: cada raíz consumidora define su tabla en su docs/<modulo>_convenciones_commits.txt (o en su CLAUDE.md mientras no exista) y jamás hereda la §3 del framework."
    sede: "corpus/docs/corpus_convenciones_commits.txt (encabezado)"
    fuerza: REGLA
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "git log de corpus-stalker: docs(assets)/chore(repo) — alcances propios, no de la §3 del framework" }
    nota: "Reformulada el 2026-07-19 (hallazgo 2.16 del COMPLETO): stalker citaba las convenciones enteras mientras la §3 lo excluía; su tabla interina vive en su CLAUDE.md §Idioma y commits."
  GIT-7:
    titulo: "No se commitea ni se pushea salvo pedido explícito del autor."
    sede: "corpus/CLAUDE.md §Git / commits"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia: INTENCION
    nota: "Unificada en los siete repos el 2026-07-19 (voto D-6): corpus-stalker solo prohibía el push y pasó a la versión estricta."

  # ── CAL — Caliber ───────────────────────────────────────────────────────────
  # CAL-1..9 son EL PATRÓN TEMPLATE DE BOOT del ecosistema: Coagulant y Craving
  # los implementan citándolos, no redefiniéndolos. Caliber NO tiene selftest ni
  # harness: su única evidencia es la paridad en juego del 2026-07-09 (CAL-10) y
  # el checklist de greps de §7 de su arquitectura. De ahí tanto INTENCION acá.

  CAL-1:
    titulo: "Boot diferido: el init no aborta con error() en file-scope — sonda de framework + boot en el hook Initialize."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §3"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus-caliber CHANGELOG «Fix de arranque», 2026-07-09 — pagado en juego" }
      - { tipo: planilla, ref: "Coagulant A1 — log de boot en ambos realms (el módulo que lo copió)" }
    nota: "Sede del patrón template. Ninguna de sus cuatro copias (estado, CLAUDE.md de Coagulant, dos inits) repite el PORQUÉ: el orden alfabético de lua/autorun/ está FUSIONADO entre addons, así que un error() no protege de nada."
  CAL-2:
    titulo: "AddCSLuaFile va siempre en file-scope: no depende de Corpus, y el cliente debe recibir los archivos aunque el boot quede diferido."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §3"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus_caliber_init.lua:52 y corpus_coagulant_init.lua:76 — copia intencional, es código template" }
  CAL-3:
    titulo: "La sonda cubre las primitivas que los sub-archivos usan en file-scope (Data/Net/Log en server, UI en client), no solo el registro."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §3"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "Coagulant slice 1 PARCHE 5 — sumó Corpus.Net a la sonda cuando bleeding empezó a usarla" }
  CAL-4:
    titulo: "Si tras Initialize no hay framework, la falla es ruidosa por MsgN — nunca por Corpus.Log, que no existiría."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §3"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "la rama else del hook Initialize en los tres inits del ecosistema" }
  CAL-5:
    titulo: "La iface nunca va inline en RegisterModule: se registra una tabla vacía que los sub-archivos pueblan por side-effect."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §3"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: selftest, ref: "coagulant_selftest, dev.lua:22 — assertea el by-ref del que este patrón depende" }
    nota: "Depende de COR-7. Si el registro introdujera un deep-copy defensivo, este patrón se cae EN SILENCIO en los tres módulos a la vez."
  CAL-6:
    titulo: "Los sub-archivos viven fuera de lua/autorun/: el init es el único loader (en autorun se auto-ejecutarían y duplicarían la carga)."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §4"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "el árbol lua/corpus_<modulo>/ de Caliber, Coagulant y Craving" }
  CAL-7:
    titulo: "El orden de carga es un manifest explícito de include() en el init, determinista y documentado — nunca el alfabético implícito."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §4"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus_caliber_init.lua — armor antes que core; corpus_coagulant_init.lua — config antes que core" }
  CAL-8:
    titulo: "Nunca invocar hacia adelante en file-scope: un archivo solo puede llamar a los anteriores del manifest."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §5"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus-coagulant — medmenu carga después de hud porque usa su silueta" }
  CAL-9:
    titulo: "La guarda de existencia se mantiene aun con el manifest fijo: cubre instalación parcial, no solo orden de carga."
    sede: "corpus-caliber/docs/Caliber_Architecture.md §5"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
  CAL-10:
