  # ── CRG-50..54 — Workbench (banco de trabajo, bloque FUTURO) ────────────────
  # Acuñados el 2026-07-19 (deuda D-13, hueco H1 del COMPLETO): Workbench_Arquitectura.md
  # eran 128 líneas de diseño de un subsistema entero con CERO IDs — el gate no estaba
  # limpio sobre él, estaba CIEGO. Las cinco de abajo son normas que la prosa YA enuncia;
  # las otras tres reglas del doc NO se acuñaron porque ya son normas de otra sede y el
  # doc pasó a CITARLAS: la eyección antes de destruir es CRG-9, el patrón de módulo
  # dueño es CRG-1, y el canal ARC9 de lectura-only es CRG-23.
  # Toda la familia Workbench es INTENCION por construcción: el bloque no está
  # implementado y no hay un solo call site que ejercerlas. Eso es honesto, no deuda.

  CRG-50:
    titulo: "El rendimiento del desarme sale de una tabla EXPLÍCITA que declara el módulo dueño, jamás de invertir la receta de crafteo; un ítem sin tabla no es desarmable."
    sede: "corpus-cargo/docs/Workbench_Arquitectura.md §5.1"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia: INTENCION
    nota: >
      La razón es de balance, no de implementación: craftear consume un multitool
      entero, así que devolverlo intacto al desarmar el resultado abre un bucle de
      ganancia infinita. 'Sin tabla declarada = no desarmable' es la posición
      conservadora: un ítem nuevo no se vuelve desarmable por olvido.
  CRG-51:
    titulo: "Herencia de condición del desarme: condicion_de_parte = condicion_de_zona × tasa_de_herramienta, determinista y previsualizable; una zona rota no entrega nada."
    sede: "corpus-cargo/docs/Workbench_Arquitectura.md §5.2"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia: INTENCION
    nota: >
      Fórmula única de todo el subsistema. Lo que la hace valiosa es la consecuencia
      EMERGENTE sin lógica extra: la armadura destrozada da partes mediocres y el
      equipo prístino vale lo mismo puesto que desarmado. Determinista a propósito —
      el jugador ve el preview exacto antes de confirmar, así que no hay tirada oculta.
  CRG-52:
    titulo: "La herramienta de corte cambia la TASA de recuperación, nunca el ACCESO: cualquier herramienta desarma cualquier ítem que tenga tabla."
    sede: "corpus-cargo/docs/Workbench_Arquitectura.md §5.3"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
    nota: "Sin bloqueo por categoría de herramienta: el cuchillo desarma lo mismo que el toolkit avanzado, con peor rendimiento (~60 % vs 100 %). Evita el anti-patrón de la llave que solo abre una puerta."
  CRG-53:
    titulo: "Asimetría de toolkit: craftear CONSUME una carga, reparar solo exige que el toolkit esté PRESENTE."
    sede: "corpus-cargo/docs/Workbench_Arquitectura.md §7"
    fuerza: REGLA
    estado: VIGENTE
    evidencia: INTENCION
    nota: "Deliberada, y es lo que le da identidad a cada pestaña. El desarme es el tercer comportamiento: no gasta carga del toolkit, desgasta la herramienta de corte (~-2 % de condición)."
  CRG-54:
    titulo: "Tope de reparación por calidad de parte: la condición de la parte asignada define el máximo restaurable de esa zona — una parte al 94 % no deja la zona al 100 %."
    sede: "corpus-cargo/docs/Workbench_Arquitectura.md §4"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia: INTENCION
    nota: >
      Es lo que sostiene la demanda de partes de calidad y le da sentido al desarme
      selectivo (CRG-51). El banco repara zonas ROTAS; las placas (mecánica de campo,
      Cargo_Architecture §4) solo restauran zonas placables y no reparan una rota:
      dos dominios de reparación sin solapamiento.

