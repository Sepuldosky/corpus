# ══════════════════════════════════════════════════════════════════════════════
# MÉTRICA DE SALUD (§7.4 · SDD-3 en Kontrol) — línea base 2026-07-16.
# El checker la reporta en cada corrida (§7.7): no se recuenta a mano.
# Referencia de Kontrol al backfillear: 159 INTENCION de 214 IDs (74%).
# ══════════════════════════════════════════════════════════════════════════════
salud:
  fecha: 2026-07-16
  # NO se escribe a mano: se COPIA de la corrida del checker (§7.7), que es quien cuenta.
  # El piloto del gate cazó este bloque con CUATRO cifras distintas para el mismo hecho
  # (178 acá, 43/178 en un PARCHE del CHANGELOG, 184 en el estado, 189 real): se editaba
  # a mano en cada tanda y nadie lo ratificaba. Es una norma que ENUMERA — se deriva del
  # árbol, no de la prosa (FLU-27). Y `por_familia` se quitó por la misma razón: era otra
  # lista a mano que se desincronizaba sola; el checker la imprime en cada corrida.
  total: 189
  intencion: 51          # 27% — la métrica que hay que bajar (§7.4)
  referencia_kontrol: "159 INTENCION de 214 (74%) al backfillear"
  nota: >
    Línea base del barrido inicial: 27% de INTENCION contra el 74% con que arrancó
    Kontrol. La diferencia no es virtud, es que este ecosistema ya tenía tres capas
    de evidencia (selftest + harness offline + planilla en juego) antes de tener
    registro — lo que faltaba era poder CITARLAS. El grueso del INTENCION restante
    es FLU: normas de conducta que hoy nada observa salvo la disciplina. Bajar ese
    número es trabajo legítimo de toda pasada, no se hace por decreto.
  asimetria_de_evidencia: >
    El dato más duro del barrido: Coagulant es el ÚNICO módulo con evidencia tipo
    planilla. Sus checks (A/E/G/H/I) se citan desde docs Y código — G4 aparece 15
    veces. Caliber, Cargo y Craving verificaron en juego SIN IDs de check: sus
    rondas existen, pero no dejaron nada citable. Es la lección §10.8 de Kontrol
    en vivo — una verificación que no deja artefacto citable no es evidencia, es
    un recuerdo. Ver deuda D-2.

# ══════════════════════════════════════════════════════════════════════════════
# DEUDA DECLARADA de esta versión. No se repara por decreto (§7.4): cada punto es
# trabajo de una pasada propia, con el autor. Se listan porque el barrido los
# encontró, no porque estén resueltos.
# ══════════════════════════════════════════════════════════════════════════════
deuda:
  D-1:
    titulo: "CERRADA 2026-07-19: Cargo cita COR-12 en su contrato de ítems, las seis copias citan en vez de re-enunciar, y el comentario de items.lua ya no induce el bug de realms."
    detalle: >
      La sede canónica es corpus/docs/CORPUS_Architecture.md §5, que la enuncia
      completa y con su razón. Pero Cargo —dueño de Items.Register, y el que IMPONE
      el gate isfunction(def.onUse) en su ui.lua— no la menciona en NINGÚN doc: ni
      Cargo_Architecture.md §3 (su contrato de ítems), ni el bloque CARGO PUBLIC
      CONTRACT. Peor: el único texto que Cargo ofrece sobre onUse es
      `onUse function(ply, ctx) -> true to consume one unit (SERVER)` en items.lua,
      que INDUCE EL BUG al leerse solo — sugiere que onUse es cosa de server.
      Las seis copias (Coagulant ×3, Craving ×2, corpus-stalker ×1) existen porque
      cada módulo que se quemó la anotó en su propia casa. corpus-stalker es el
      próximo que registrará ítems.
    propuesta: "Cumplida. El remanente (el comentario `onUse ... (SERVER)` de items.lua) se corrigió en la tanda del 2026-07-19: ahora dice que def+onUse van en AMBOS realms y la closure solo CORRE en server, citando COR-12."
  D-8:
    titulo: "El barrido de Cargo registró los invariantes portantes; su prosa de grano fino queda sin ID."
    detalle: >
      Cargo tiene ~220 enunciados normativos entre CLAUDE.md, cuatro docs de
      arquitectura, el roadmap y los headers de código. Esta pasada acuñó 48. Lo que
      quedó fuera es sobre todo GUIA y REGLA de grano fino (detalles de layout del
      wheel, del editor de íconos, del Workbench —que ni siquiera está implementado—).
      Se declara para que nadie lea 'CRG tiene 48 IDs' como 'Cargo está cubierto'.
    propuesta: "Se acuñan cuando su pasada los toque (FLU-30 lo fuerza para toda norma nueva; las viejas se suben por oportunidad)."
  D-9:
    titulo: "CERRADA 2026-07-19: CRG-38 vive ahora en Cargo_ItemImages_Arquitectura §5, con la aclaración de que los pares del doc van en ancho×alto de código."
    detalle: >
      Es la norma más frágil del ecosistema: el CHANGELOG no se reescribe por
      disciplina (FLU-14), así que la regla queda fosilizada donde nadie la busca.
      Y CRG-36 declara que el footprint vive en Cargo_ItemImages §5 — que lista
      'placa 2×3 vertical' y un set permitido de pares SIN aclarar en qué notación
      están. Un lector que tome §5 al pie de la letra reproduce el bug del toolgun.
      Es a la vez D-3 (sede en historial) y una trampa activa.
    propuesta: "Cumplida (voto f, 2026-07-19): la trampa activa quedó desactivada — §5 ya no puede leerse al pie de la letra y reproducir el bug del toolgun. La entry de CHANGELOG queda como historia (FLU-14)."
  D-2:
    titulo: "RECORTADA 2026-07-19 (voto e): los IDs de check rigen HACIA ADELANTE; lo verificado antes de FLU-07 queda como pre-norma, sin reconstrucción retroactiva."
    detalle: >
      Solo Coagulant usó IDs (A/E/G/H/I, rondas 1-6). Caliber cerró su Block por
      'paridad de comportamiento en juego' el 2026-07-09 sin un ID; Cargo y Craving
      igual. FLU-07 declara los IDs de check obligatorios y canónicos desde el
      2026-07-14 — o sea que la norma existe y tres repos la incumplen. Sin IDs,
      la evidencia mejor calibrada del ecosistema (§7.4) no se puede citar desde
      el registro. (D-1 quedó REPARADA el 2026-07-19: Cargo, el dueño de la API,
      ya enuncia la regla de realms en Cargo_Architecture.md §3 citando COR-12 con
      su causa; y las seis copias de los módulos pasaron de re-enunciar a CITAR.
      Sigue abierto el comentario de items.lua que anota `onUse ... (SERVER)` e
      induce el bug — es .lua, va en la pasada de D-3.)
      ACTUALIZADO 2026-07-16: el checker (§7.7) YA valida la evidencia `planilla`
      —exige que el ID de check esté citado en el repo del módulo— y su fixture
      `evidencia-planilla-rota` prueba que caza una cita fantasma. Pero hoy solo
      Coagulant puede usar ese tipo de evidencia: en los otros tres, cualquier
      `planilla` que se escriba sale EVIDENCIA_ROTA, con razón. La deuda no es del
      checker; es que tres módulos verificaron sin dejar rastro.
    propuesta: >
      Votado por el autor el 2026-07-19: (1) todo cierre de ronda futuro pega el
      reporte de la planilla con sus IDs al CHANGELOG del repo (FLU-11 ya emite ese
      formato); (2) las verificaciones pre-2026-07-14 NO se retro-etiquetan —
      reconstruir evidencia sería fabricarla (Caliber cerró el 2026-07-09, antes de
      que FLU-07 existiera). Queda abierta solo como recordatorio: se cierra sola
      cuando Caliber, Cargo y Craving tengan una ronda post-norma con IDs en su
      CHANGELOG; la primera candidata es la ronda 7 de Coagulant.
  D-3:
    titulo: "RECORTADA 2026-07-19 (2.ª vez): NINGUNA sede vive ya en un CHANGELOG, un estado ni un roadmap. Quedan 11 sedes en archivos .lua, y varias son legítimas."
    detalle: >
      COA-14 (todo el pintado en pcall — la trampa la pagó CARGO y ni el CLAUDE.md
      ni la arquitectura la enuncian), COA-6 (el math.min del piso de velocidad),
      COA-17 (el NW2 on-change), CAL-15 (el no-overflow del escudo). El CHANGELOG
      no se reescribe por disciplina (FLU-14) pero tampoco se lee al diseñar; un
      comentario de código viola FLU-26 (un comentario CITA, jamás DEFINE). Quien
      escriba un HUDPaint nuevo siguiendo solo los docs rompe COA-14.
    propuesta: >
      Aprobado en principio por el autor (voto f, 2026-07-19), ejecutado en dos tandas.
      1.ª tanda: el subconjunto que desactivaba trampas pagadas (COA-14, CRG-38 + el
      comentario de items.lua).
      2.ª tanda (D-13, 2026-07-19): se movieron las CINCO sedes que vivían en un
      doc-árbitro o en un doc de intención — CRG-45 (de cargo_roadmap, que además NO
      contenía la etiqueta: sede rota por partida doble) a Cargo_Architecture §13.1;
      FLU-15 (del encabezado de corpus_estado — la norma sobre cómo se escribe un
      estado tenía por sede un estado, y se autodestruía) al flujo §1 PASO 5; CRG-42
      (de cargo_estado) a Cargo_Architecture §4; y COA-6 y COA-17 (del CHANGELOG de
      Coagulant, donde un INVARIANTE contradice FLU-14) a Coagulant_Architecture §6.
      ESTADO DERIVADO DEL REGISTRO al cierre de esa tanda: sedes en CHANGELOG = 0, en
      <modulo>_estado.md = 0, en roadmap = 0. Quedan ONCE en archivos .lua, y el
      recorte que falta es de CRITERIO, no de trabajo: varias son legítimas —CAL-12,
      CRG-2 y CRG-5 tienen su sede en el bloque CONTRATO del init, que ES el lugar
      canónico de un contrato público— mientras que CRG-46 (el saneo del único
      net.Receive sin gate) no está en prosa en ninguna parte y sí debería subir.
      Distinguir una de otra es decisión de diseño y va por oportunidad, en la próxima
      pasada de cada repo, dejando la cita por ID en el código.
  D-4:
    titulo: "CERRADA 2026-07-19: Caliber_Architecture §1 ya enuncia la cadena completa (Hit → escudo → armadura → limbs) citando CAL-13."
    detalle: >
      El autor pidió además reconciliar el doc entero contra el código (sospechaba
      drift de la era ADS). El barrido encontró el §3 (boot diferido) CORRECTO y
      tres ajustes más, aplicados: la fila UI del §6 confundía el tab del menú Q con
      el browser por-NPC (los 6 sub-tabs viven en el browser, concommand
      caliber_browser); el §6 omitía la segunda key de persistencia scav_weights; y
      el §7 no declaraba los paths de assets sound/ads/ y materials/ads/ — quedaron
      anotados como residual de 5.ª clase, fuera del alcance del rename. Los
      deferrals de §9 están fielmente descritos (sin árbitro, no se tocaron).
    propuesta: "Cumplida."
  D-5:
    titulo: "CRV-4 congela una firma de Coagulant que Coagulant nunca ratificó."
    detalle: >
      ApplyExternalCondition(ply, id, severity) está congelada mock-first por el
      CONSUMIDOR (Craving, §4 de su arquitectura, que la marca 'a ratificar en
      Coagulant_Architecture.md §8'). El dueño no la firmó. Es FLU-17 funcionando
      a medias: la firma se congeló, pero la ratificación quedó pendiente.
    propuesta: "Ratificarla en Coagulant_Architecture.md §8 o negociarla, cuando Coagulant cierre su ronda 7."
  D-6:
    titulo: "CERRADA 2026-07-19: política git unificada en la versión estricta — ni commit ni push sin pedido, en los siete repos (voto del autor)."
    detalle: >
      corpus-stalker era el único divergente (solo prohibía el push); su CLAUDE.md
      pasó a la versión estricta citando GIT-7.
    propuesta: "Cumplida."
  D-7:
    titulo: "RECORTADA 2026-07-19 (2.ª vez, con D-3): la prosa de módulo ya lleva sus IDs y las sedes fuera de un doc de diseño bajaron de 16 a 11, todas en .lua."
    detalle: >
      La pasada de etiquetado (PROMPT_d7_etiquetado_ids.txt) cubrió los cinco repos:
      CAL 22/22, COA 27/31, CRV 15/16, CRG 38/48, STK 7/8. Los 16 restantes NO son
      olvido: son las sedes que viven en archivos .lua, en CHANGELOG.md, en un
      <modulo>_estado.md, en un roadmap o en un README. Etiquetar ahí volvería
      DEFINITORIO un comentario (viola FLU-26) o tocaría un doc que no se reescribe
      (FLU-14) o uno volátil. O sea: lo que queda de D-7 ES la deuda D-3, y se cierra
      moviendo esas sedes a un doc de diseño — decisión de diseño, no mecánica.
      El gate COMPLETO (AUD-2) ya puede correr sin ahogarse en `sinId` de módulo.
    propuesta: >
      Se cierra junto con D-3, moviendo a un doc las sedes que lo ameriten. ACTUALIZADO
      2026-07-19 (tanda D-13): de las 16 se movieron CINCO —las que vivían en un
      doc-árbitro o en un doc de intención, que eran las verdaderamente insostenibles
      (CRG-45, FLU-15, CRG-42, COA-6, COA-17)—. Quedan ONCE, todas en `.lua`, y el
      número no va a bajar a cero: varias de esas sedes son LEGÍTIMAS. CAL-12, CRG-2 y
      CRG-5 viven en el bloque CONTRATO del init de su módulo, que ES el lugar canónico
      de un contrato público — moverlas empeoraría el doc. El criterio de cierre no es
      "cero sedes en .lua" sino "ninguna norma vive donde nadie la busca al diseñar":
      el caso pendiente claro es CRG-46 (el saneo del único net.Receive sin gate), que
      no está en prosa en ninguna parte.
  D-10:
    titulo: "CERRADA 2026-07-19: los dos casos duros subieron a la prosa (COA-20 a §7; COA-35 acuñado y enunciado en §11) y los títulos fusionados se partieron o recortaron."
    detalle: >
      Lo destapó el etiquetado, y es deuda MÍA del barrido inicial: para que el título
      entrara en "≤1 frase" comprimí normas que la sede enuncia en dos párrafos, dos
      viñetas o una tabla + prosa. Casos confirmados: COA-16, COA-19, COA-20, COA-27,
      CRV-5, CRV-9, CRG-6, CRG-10, CRG-24, CRG-48. Consecuencia práctica: la etiqueta
      no tiene un párrafo único donde anclarse, y el gate ve un título que afirma más
      de lo que su sede sostiene.
      DOS SON PEORES QUE LAS OTRAS, porque el registro afirma algo que la sede NO dice:
        · COA-20 — "quitarlo no exige ni consume ítem" no está enunciado en §7.
        · COA-27 — "un check jamás hardcodea un número tunable" solo vive en el campo
          `evidencia` del yaml, no en §11.
      Es la patología INVERSA a la que el sistema venía cazando (el doc que miente):
      acá miente el índice. Por §7.1 el yaml no litiga contra su sede, así que el yaml
      es el que se corrige — salvo que el autor decida que la norma faltante debe subir
      a la prosa.
    propuesta: >
      Cumplida (votos a y f, 2026-07-19). Partidos: COA-16→+COA-33 (barra
      client-side), COA-19→+COA-34 (cancelación), COA-27→+COA-35 (check no
      hardcodea), CRV-5→+CRV-17 (fórmula severity), CRV-9→+CRV-18 (espejo NW2),
      CRG-10→+CRG-49 (la fila de tabs no crece). Sede ampliada para calzar el
      título: CRG-6 (Save+Sync en el contrato 7) y CRG-24 (terceros en general, no
      solo ARC9). Reescrito a su sede: CRG-48 (las tres capas de idioma).
  D-11:
    titulo: "CERRADA 2026-07-19: COR-15 (UI shell) y COR-16 (log) acuñados en el CLAUDE.md del framework; los contratos 5-6 de Caliber pasaron a citarlos."
    detalle: >
      Lo destapó el etiquetado de Caliber: sus contratos 5 ("una sola entrada en el menú
      Q vía Corpus.UI.RegisterTab") y 6 ("toda salida de consola va por Corpus.Log") son
      normas del FRAMEWORK, y no hay ID que las cubra. COR-1..14 tiene registro (COR-2),
      persistencia (COR-3), net (COR-4), detección (COR-5), prefijo (COR-6), by-ref
      (COR-7)... pero nada para UI ni para Log, que son dos de las seis primitivas que
      COR-10 declara. El barrido inicial las salteó porque el CLAUDE.md del framework no
      las enuncia como contrato numerado — solo las lista en el mapa de archivos.
    propuesta: "Cumplida (voto b, 2026-07-19). Las seis primitivas de COR-10 tienen ahora contrato citable."
  D-12:
    titulo: "CERRADA 2026-07-19: dev/harness_coagulant.py existe, corre en verde y las 16 acreditaciones COA tipo:harness (más la de COR-12) ya lo citan por ruta."
    detalle: >
      Lo destapó el COMPLETO (acta 2026-07-19, §5 H3): corpus-coagulant/CLAUDE.md
      declara su harness "de scratchpad, se reconstruye por sesión" (régimen viejo,
      igual que decía Cargo antes del hallazgo 2.5), y corpus-craving/CLAUDE.md
      acredita el patrón como "verificó Corpus, Cargo y Coagulant" — pero en dev/ solo
      existen harness_cargo.py y harness_craving.py. Varias entradas COA del registro
      llevan evidencia tipo:harness (COA-2, COA-4, COA-5, COA-6 entre otras) cuyos
      checks corrieron en un harness que ya no existe como archivo citable.
      NO se tocó corpus-coagulant/CLAUDE.md:71 en la tanda de reparación, a propósito:
      ahí la afirmación de scratchpad podría ser la históricamente correcta.
    propuesta: >
      Cumplida por la opción (a), votada por el autor el 2026-07-19. Lo que la
      decisión encontró al derivarse del árbol (FLU-27): el acta nombraba COA-2,
      COA-4, COA-5 y COA-6, pero el registro llevaba DIECISÉIS entradas COA con
      `tipo: harness` — el 47 % de la familia — más la de COR-12, que se apoyaba a
      medias en el mismo archivo ausente. El costo real de (b) era re-adjudicar 17
      acreditaciones, no 4.
      El harness se construyó re-derivando los checks del CHANGELOG de Coagulant
      (rondas 1-6) y del código, nunca inventándolos, y corre 173 checks propios
      (124 server / 49 client) más el `_SelfTest` del módulo en ambos realms
      (145 + 108). Dos escenarios del primer borrador eran IRREALES y se
      corrigieron contra el código, no al revés: sin herida abierta el tick
      regenera antes de calcular el drenaje (§4), así que "sangre 0" exigía una
      herida activa; y comparar el multiplicador de cojera del cliente contra un
      estado del server POSTERIOR al snapshot no probaba igualdad entre realms.
      Las 17 refs pasaron de describir un check suelto a nombrar la ruta del
      archivo y el escenario que corre.
  D-13:
    titulo: "CERRADA 2026-07-19: los 10 docs ciegos ya declaran IDs, nacieron los 3 docs que faltaban, y las 4 mejoras del gate están aplicadas. El corpus auditable pasó de 29 a 32 docs."
    detalle: >
      Del acta 2026-07-19 (§5): H1 — los 10 docs ciegos (los 5 *_convenciones de
      módulo, los 4 roadmaps de módulo, Workbench_Arquitectura y la semilla de
      Craving) suman 1.828 líneas donde un "limpio" significa "no auditado"; H5 —
      corpus-stalker necesita stalker_convenciones_commits.txt + una arquitectura
      mínima (su CLAUDE.md está haciendo de arquitectura), y Cortex necesita un doc
      de CONTRATOS ENTRANTES (≥5 firmas ya congeladas por otros repos, sin lugar
      donde cruzarse); H6 — subir la taxonomía a 18 buckets (compat-terceros y
      ciclo-de-vida-del-jugador primero); H7 — agregar al workflow la fase
      contrato-vs-árbol (un agente por CLAUDE.md); H8 — que el .js cite la jerarquía
      por ID en vez de duplicarla, y su columna `total` quedó corta en 5 filas.
    propuesta: >
      Cumplida. Lo que se hizo, en los cuatro frentes:
      (a) ACUÑACIÓN — 9 IDs nuevos, ni uno de más: los cuatro de la tabla de alcances de
      cada módulo (CAL-23, COA-36, CRV-19, CRG-55) y los cinco de Workbench (CRG-50..54).
      En Workbench se acuñó lo que la prosa YA enunciaba y se CITÓ el resto: la eyección
      antes de destruir es CRG-9, el patrón de módulo dueño es CRG-1 y el canal ARC9 es
      CRG-23 — tres normas que la tentación era re-acuñar. Los 4 roadmaps y la semilla de
      Craving reciben CITAS y una NOTA DE LECTURA que los declara intención pura /
      registro histórico, NO-AUDITABLE POR DISEÑO (voto del autor: no acuñan).
      (b) D-3 parcial — ver esa entrada: cinco sedes movidas, cero restantes fuera de un
      doc de diseño salvo las once en .lua.
      (c) DOCS NUEVOS — corpus-stalker ganó STALKER_Arquitectura.md (mínima: alcance,
      frontera y mapa de consumo por módulo) y stalker_convenciones_commits.txt (STK-9,
      con 3 alcances en uso y 7 reservados); corpus-cortex ganó Cortex_ContratosEntrantes.md,
      doc de RECEPCIÓN que junta las SEIS firmas que otros repos ya le congelaron y las
      cruza entre sí por primera vez — no se contradicen. Ese doc no acuña ningún CTX:
      la familia sigue reservada sin entradas, y su primera entrada exige antes crear el
      CLAUDE.md de Cortex.
      (d) GATE — taxonomía a 18 buckets (entran compat-terceros, ciclo-de-vida-del-jugador,
      config-y-balance y rendimiento); fase nueva ContratoArbol (un agente por CLAUDE.md,
      contrato por contrato contra el Lua, sin adjudicación adversarial porque el Lua es
      nivel 1 y no hay nada que deliberar); el .js dejó de duplicar la jerarquía y la cita
      por FLU-22; y la columna `total` re-derivada.
      HALLAZGO DE LA RE-DERIVACIÓN, y era peor de lo que el acta creía: la columna estaba
      desincronizada en las 29 filas, no en 5 — la derivación anterior había contado SIN
      las líneas vacías. No es cosmético: los TRAMOS se calculan con ese número, así que
      la COLA de cada doc quedaba fuera del rango leído y nadie lo notaba. Es un
      limpio-por-omisión escondido en una constante, cometido por el gate que existe para
      cazarlos.
      Queda para el 2.º COMPLETO: correrlo. Va en sesión fresca aparte con su propio
      PROMPT (AUD-3, Opus 4.8), y editar el .js invalida el caché de resume — esperable.
  D-14:
    titulo: "VOTO ABIERTO del autor (2026-07-20): ¿COR-12 —el contrato de ítems— es infraestructura demostrablemente compartida y pertenece al framework, o es dominio infiltrado en el framework delgado y su sede es Cargo?"
    detalle: >
      Hallazgo más caro del acta 2026-07-20 (Hueco 2). NO tiene árbitro de código
      (§7.1, corolario): ambas lecturas son implementables, y el árbol no dirime cuál
      es la correcta. Por eso NO es triage A y NO se parcha sin el autor.
      A FAVOR DE QUE SE QUEDE en el framework: COR-12 gobierna a CUATRO consumidores
      (Coagulant, Craving, corpus-stalker y el propio Cargo), y su nota acá mismo se
      autodeclara "la ÚNICA sede que enuncia las dos mitades con su razón". Moverla a
      Cargo la convierte en norma de un módulo sobre otros módulos, que es exactamente
      lo que COR-11 evita.
      A FAVOR DE QUE BAJE a Cargo: COR-1 y COR-10 son explícitos en que NI SIQUIERA lo
      compartido por dos módulos sube. Un contrato de ítems ES dominio. Cargo es el
      dueño de Items.Register y el que impone el gate isfunction(def.onUse).
      D-1 está CERRADA y NO cubre esta pregunta: cerró que Cargo CITARA COR-12, no
      dónde vive.
    propuesta: >
      RECOMENDACIÓN, para que el autor la acepte o la tumbe — no reemplaza su voto:
      que COR-12 SE QUEDE en el framework, con la justificación reencuadrada. COR-12 no
      gobierna *ítems*: gobierna el PROTOCOLO DE REGISTRO entre módulos (defs en shared,
      onUse invocable client-side), del mismo linaje que COR-3 (persistencia namespaced)
      y COR-4 (net namespaced), que también nacieron para evitar colisión entre
      consumidores y nadie llama dominio.
      EL PRECIO A PAGAR, y conviene escribirlo en el voto: COR-12 debe enunciar solo la
      FORMA del contrato, nunca la SEMÁNTICA del ítem. Si algún día menciona stacks, peso
      o slots, ahí sí bajó dominio al framework y este voto se reabre.
      NO SE CIERRA SIN EL AUTOR.
