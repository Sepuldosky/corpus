# ══════════════════════════════════════════════════════════════════════════════
# docs/ids.yaml — REGISTRO CANÓNICO DE IDs NORMATIVOS DEL ECOSISTEMA CORPUS
# ══════════════════════════════════════════════════════════════════════════════
# · Norma canónica del registro: corpus/docs/corpus_flujo_trabajo.txt §7.4.
# · ÚNICO para las SIETE raíces (framework + cinco módulos + corpus-stalker). Un
#   registro por repo multiplicaría los lugares que derivan — que es el problema
#   que este archivo existe para matar (§7.0).
# · El registro es ÍNDICE + CONTRATO, jamás segunda definición: la prosa canónica
#   vive en la SEDE de cada entrada. El `titulo` es ≤1 frase, anti-deriva.
# · AUTORIDAD: este archivo NO integra la jerarquía §7.1. La SEDE gana siempre; si
#   el yaml contradice la prosa de la sede, el yaml está DESACTUALIZADO — se
#   corrige el yaml, no se litiga contra el doc.
# · Norma nueva ⇒ entrada acá EN EL MISMO PARCHE que la acuña (§7.4).
# · Prefijo nuevo ⇒ primero en `familias` (§7.4). Reusar un prefijo está PROHIBIDO:
#   fabrica un ID bicéfalo al nacer (§7.2).
#
# EVIDENCIA (§7.4) — acá no hay test runner; los tipos válidos son:
#     selftest  · un check de `corpus_selftest`
#     harness   · un check del harness offline con stubs de GMod (dev/harness_*.py)
#     planilla  · un check de la planilla de verificación EN JUEGO, por su ID
#                 estable (§1 PASO 4) — p.ej. { tipo: planilla, ref: "Caliber J4" }
#     codigo    · el call site en Lua que ejerce la norma, cuando no hay check
#     INTENCION · el literal. Declarada, nada la ejerce todavía.
# La evidencia es PRESENCIAL, no semántica: prueba que el check existe y cita la
# norma, NO que la ejerza bien. Eso lo cubren la curaduría y el autor en juego.
# El conteo de INTENCION es la MÉTRICA DE SALUD del proceso (ver `salud`, al pie).
#
# · Creado 2026-07-16 (Bloques A y B del plan dev/HANDOFF_corpus_sdd_workflow.md),
#   por barrido de las normas que YA existían en prosa. No se acuñó ninguna norma
#   nueva en la pasada: acuñar y registrar son actos distintos.
# · El checker determinista (Bloque C) EXISTE desde el 2026-07-16:
#   corpus/.claude/check-ids/corpus_check_ids.ps1 (§7.7). Corre solo en pre-commit
#   cuando el commit toca superficie normativa, y a mano cuando quieras. Valida este
#   archivo contra las siete raíces: yaml, prefijos, duplicados, sedes, evidencia,
#   huérfanos. Su límite es PRESENCIAL, no semántico — ver §7.7.
# ══════════════════════════════════════════════════════════════════════════════

familias:
  COR: { dominio: framework,  sede: "corpus/CLAUDE.md §Contratos que no debes romper" }
  FLU: { dominio: proceso,    sede: "corpus/docs/corpus_flujo_trabajo.txt" }
  AUD: { dominio: auditoria,  sede: "corpus/docs/corpus_flujo_trabajo.txt §7.8" }
  GIT: { dominio: commits,    sede: "corpus/docs/corpus_convenciones_commits.txt" }
  CAL: { dominio: caliber,    sede: "corpus-caliber/CLAUDE.md" }
  CRG: { dominio: cargo,      sede: "corpus-cargo/CLAUDE.md" }
  COA: { dominio: coagulant,  sede: "corpus-coagulant/CLAUDE.md" }
  CRV: { dominio: craving,    sede: "corpus-craving/CLAUDE.md" }
  # `pendiente: true` = el prefijo está RESERVADO pero su sede todavía no existe (Cortex
  # tiene LICENSE, README y docs/Cortex_ContratosEntrantes.md, pero no CLAUDE.md).
  # Reservar no es acuñar: el checker deja pasar la sede
  # inexistente MIENTRAS la familia no tenga entradas, y se pone rojo el día que alguien
  # acuñe CTX-1 sin haber creado el CLAUDE.md. Lo destapó el acta del piloto v3: la sede
  # apuntaba a un archivo fantasma y nadie lo veía porque el checker no miraba las familias.
  CTX: { dominio: cortex,     sede: "corpus-cortex/CLAUDE.md", pendiente: true }
  STK: { dominio: stalker,    sede: "corpus-stalker/CLAUDE.md" }

# Prefijo listado acá = PROHIBIDO registrarlo o reusarlo como familia normativa.
# Derivado por grep del árbol real (FLU-27), no copiado de un doc: las secciones de
# planilla realmente en uso son las de Coagulant, rondas 1-6.
familias_excluidas:
  A: "IDs de check de planilla (A1, A2 — ronda 1) — son EVIDENCIA, no normas; se citan en `evidencia`, tipo planilla"
  E: "ídem A — el 'punto E' de la ronda 1/2 de Coagulant (la def invisible, COR-12)"
  G: "ídem A — sección de planilla (G1-G6, rondas 3-4)"
  H: "ídem A — sección de planilla (H1-H8, rondas 5-6)"
  I: "ídem A — sección de planilla (I1-I4, ronda 6)"
  D: "'Block N' y las decisiones de diseño rotuladas (D1, D2… en las semillas y roadmaps) — provenance, no normas"
# Nota de método: la primera versión de esta tabla listaba J/K/L/M, copiados del
# EJEMPLO del handoff ("planilla Caliber, check J4"). Esas letras no existen en
# ningún repo. Es exactamente el error que FLU-27 nombra — enumerar desde un doc en
# vez de derivar del código — cometido en la misma tanda que acuñó la norma. Queda
# anotado acá a propósito: la próxima sección de planilla se suma a esta tabla
# ANTES de usarse (FLU-30), y se deriva del árbol.

ids:

  # ── COR — el framework ──────────────────────────────────────────────────────
  # Sede de COR-1..6 y COR-9: corpus/CLAUDE.md. Sede de COR-7/8/10/11: la
  # arquitectura. Los seis primeros son los "Contratos que no debes romper".

  COR-1:
    titulo: "Nada de lógica de dominio en Corpus: solo registro, persistencia, net, UI shell, ready barrier y log."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 1"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus/lua/autorun/ — las 6 primitivas y nada más" }
  COR-2:
    titulo: "Namespace único: todo cuelga del global Corpus; los módulos se acceden vía Corpus.GetModule, nunca como globals sueltos."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 2"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: selftest, ref: "corpus/lua/autorun/corpus_selftest.lua" }
  COR-3:
    titulo: "Persistencia namespaced: Corpus.Data.Save/Load(module, key, tbl) → data/corpus/<module>/<key>.json; un módulo no escribe fuera de su namespace."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 3"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: selftest, ref: "corpus/lua/autorun/corpus_selftest.lua" }
  COR-4:
    titulo: "Net namespaced: Corpus.Net.Register(module, msgName) → \"corpus_<module>_<msgName>\", para evitar colisión global de net.Receive."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 4"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: selftest, ref: "corpus/lua/autorun/corpus_selftest.lua" }
  COR-5:
    titulo: "Detección, nunca asunción: ningún módulo asume que Corpus u otro módulo ya cargó — lazy check o Corpus.OnReady."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 5"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus-caliber — boot diferido a Initialize (CAL-1), el patrón template" }
  COR-6:
    titulo: "Prefijo de archivo por addon: los seis consumidores (cinco módulos + corpus-stalker) usan corpus_<addon>_*.lua en todo su árbol Lua; el framework se reserva corpus_<primitiva>.lua. Contra colisión entre los siete addons montados a la vez."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 6"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus/lua/autorun/corpus_<primitiva>.lua sin segmento vs. corpus-cargo/lua/autorun/corpus_cargo_init.lua con segmento" }
    nota: "Reformulado el 2026-07-19 (voto del autor sobre el hallazgo 2.4 del acta v3 + el voto abierto del CHANGELOG): cierra los dos ejes podridos de la cláusula vieja — «siete addons» cuando el framework usa el prefijo desnudo load-bearing, y «en lua/autorun/» cuando el árbol de los módulos vive fuera."
  COR-7:
    titulo: "Invariante by-ref: RegisterModule y GetModule guardan y devuelven la MISMA tabla por referencia — sin deep-copy ni normalización."
    sede: "corpus/docs/CORPUS_Architecture.md §3"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: harness, ref: "harness offline de Corpus, 46 checks, ambos realms (2026-07-09)" }
      - { tipo: codigo, ref: "corpus-caliber — el patrón 'tabla vacía poblada por side-effect' depende de esto" }
  COR-8:
    titulo: "Corpus.Data SÍ normaliza en el round-trip JSON: lo que sale de Load puede no tener el tipo de clave que entró en Save — contrato distinto a COR-7."
    sede: "corpus/docs/CORPUS_Architecture.md §3"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia: INTENCION
  COR-9:
    titulo: "Cada archivo del framework es autosuficiente (`Corpus = Corpus or {}` al tope) y no asume orden de carga dentro de lua/autorun/."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 7"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "el tope de cada archivo de corpus/lua/autorun/" }
  COR-10:
    titulo: "Regla cardinal — framework delgado: solo sube infraestructura demostrablemente compartida; ni siquiera una pieza de dominio compartida por dos módulos sube."
    sede: "corpus/docs/CORPUS_Architecture.md §3-4"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "el pool de HP de extremidades vive en Caliber (corpus_caliber_limbs.lua), no en Corpus" }
  COR-11:
    titulo: "Regla cardinal — la única hard-dep del ecosistema es Corpus; todo lo demás es soft-dep detectada en runtime."
    sede: "corpus/docs/CORPUS_Architecture.md §2"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "los edges soft con lazy-check + pcall y degradación honesta (§2 tabla)" }
  COR-12:
    titulo: "La def de ítem Y su onUse se registran en AMBOS realms (shared); el onUse solo CORRE en server."
    sede: "corpus/docs/CORPUS_Architecture.md §5"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: planilla, ref: "Coagulant punto E — ronda 1 ✗ → ronda 2 ✓ 14/14 (la def invisible)" }
      - { tipo: codigo, ref: "Coagulant slice 2 PARCHE 8 — el gate isfunction(def.onUse) client-side" }
      - { tipo: harness, ref: "dev/harness_craving.py — pasada CLIENT con Cargo fake: las 6 defs y su onUse se registran también en el cliente" }
      - { tipo: harness, ref: "dev/harness_coagulant.py — pasada CLIENT con Cargo fake: las 4 defs médicas y su onUse se registran también en el cliente" }
    nota: >
      LA NORMA MÁS CARA DEL ECOSISTEMA. Son dos mitades pagadas por separado: una def
      solo-server no existe en el cliente y el grid no la renderiza (el snapshot de Cargo
      solo transporta las defs autogen/icon_override); y la UI exige isfunction(def.onUse)
      client-side para habilitar «Use» y el quick bind, así que un onUse solo-server deja
      el ítem visible pero inusable. Ésta es la ÚNICA sede que enuncia las dos mitades con
      su razón. Vive en el framework y no en Cargo — ver deuda D-1, que es seria.
  COR-13:
    titulo: "El retorno de onUse gobierna el consumo: Cargo descuenta una unidad solo si devuelve true; false habilita el consumo diferido y el rechazo."
    sede: "corpus/docs/CORPUS_Architecture.md §5"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: planilla, ref: "Coagulant G2 y G5 (consumo diferido); Craving en juego (rechazo con barra llena)" }
      - { tipo: selftest, ref: "cargo_selftest — contrato" }
    nota: "Las dos ramas del false están en uso real: Coagulant descuenta al completar (COA-3) y Craving rechaza con el stat lleno (CRV-8). El CLAUDE.md de Cargo la enuncia en media línea, sin los dos casos."
  COR-14:
    titulo: "Ningún módulo de dominio necesita Cargo para funcionar: solo lo aprovecha si está."
    sede: "corpus/docs/CORPUS_Architecture.md §5"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "Coagulant: vía mínima propia sin Cargo; Craving: entity de mundo con WALK+USE" }
  COR-15:
    titulo: "UI shell vía la primitiva: una sola entrada por módulo en el menú Q (Corpus.UI.RegisterTab, categoría única Corpus); las ventanas adicionales se abren por botón/concommand desde su tab, y los stools quedan fuera de la norma (pestaña Tools, categoría del módulo)."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 8"
    fuerza: INVARIANTE
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "check visual 2026-07-09: tab de Caliber en Q → Utilities → Corpus; el browser por-NPC va por concommand caliber_browser" }
    nota: "Acuñado el 2026-07-19 (voto D-11): la prosa vivía en el CLAUDE.md de Caliber (su contrato 5), que ahora la cita."
  COR-16:
    titulo: "Log vía la primitiva: toda salida de consola de módulo va por Corpus.Log → prefijo [Corpus:<module>]; dos excepciones, ambas del framework — el fallback MsgN del boot cuando el framework mismo falta, y el reporte de corpus_selftest.lua."
    sede: "corpus/CLAUDE.md §Contratos que no debes romper · 9"
    fuerza: REGLA
    estado: VIGENTE
    evidencia:
      - { tipo: codigo, ref: "corpus_log.lua; el fallback MsgN del init de Caliber es la excepción declarada" }
    nota: "Acuñado el 2026-07-19 (voto D-11): la prosa vivía en el CLAUDE.md de Caliber (su contrato 6), que ahora la cita."

  # ── FLU — el proceso (sede: corpus/docs/corpus_flujo_trabajo.txt) ───────────

  FLU-01:
